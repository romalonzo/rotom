<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Rotom Test Fixture</title></head>
<body>
  <h1>Rotom Test Fixture</h1>

  <button id="signin" onclick="document.getElementById('status').textContent='clicked'">Sign in</button>
  <div id="status">idle</div>

  <input data-testid="email" type="email" />

  <label for="pw">Password</label>
  <input id="pw" type="password" oninput="document.getElementById('pwecho').textContent=this.value" />
  <div id="pwecho"></div>

  <input placeholder="Search..." />

  <a href="#docs">Docs</a>

  <div class="only-css">CSS Only</div>

  <button id="later" style="display:none" onclick="void 0">Later</button>
  <script>
    // reveal the hidden button after 600ms to exercise rotom_wait_for
    setTimeout(function () { document.getElementById('later').style.display = 'inline-block'; }, 600);
  </script>
</body>
</html>
